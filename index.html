<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#14301A">
<title>Derby Bet Tracker 🌹</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#C8922A;--gold-light:#F5E9CF;--gold-mid:#E8C97A;--gold-pale:#FDF6E8;
  --green:#14301A;--green-mid:#2A6035;--green-light:#EDF5EE;--green-muted:#4A7A52;
  --surface:#FFFFFF;--surface2:#F7F5F0;--surface3:#EEEBE3;
  --text:#1A1A14;--text2:#5A5748;--text3:#9A9488;
  --border:#E0DDD5;--border2:#C8C4BA;
  --red:#8B1A1A;--red-light:#FDF0F0;
  --radius:14px;--radius-sm:10px;--radius-pill:100px;
  --ff-head:'Playfair Display',Georgia,serif;
  --ff-body:'DM Sans','Helvetica Neue',sans-serif;
  --shadow:0 2px 16px rgba(0,0,0,0.08);
}
html,body{height:100%;background:var(--surface2);font-family:var(--ff-body);color:var(--text);font-size:16px;line-height:1.5}

/* HEADER */
.header{
  background:var(--green);
  padding:env(safe-area-inset-top,0) 0 0;
  position:sticky;top:0;z-index:100;
}
.header-inner{padding:16px 20px 14px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-family:var(--ff-head);font-size:20px;color:var(--gold-mid);font-weight:700;letter-spacing:0.01em}
.header p{font-size:11px;color:#7AAA7E;margin-top:1px}
.stats-row{display:flex;border-top:1px solid rgba(255,255,255,0.07);padding:10px 20px;gap:0}
.stat{flex:1;text-align:center;padding:0 8px;border-right:1px solid rgba(255,255,255,0.1)}
.stat:last-child{border-right:none}
.stat-val{font-size:18px;font-weight:600;color:var(--gold-mid);display:block}
.stat-lbl{font-size:10px;color:#7AAA7E;text-transform:uppercase;letter-spacing:0.06em;display:block;margin-top:1px}

/* NAV TABS */
.nav{
  display:flex;background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 12px;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.nav::-webkit-scrollbar{display:none}
.nav-btn{
  flex-shrink:0;padding:12px 16px;font-family:var(--ff-body);font-size:13px;font-weight:500;
  color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;
  cursor:pointer;white-space:nowrap;transition:all 0.15s;
}
.nav-btn.active{color:var(--green-mid);border-bottom-color:var(--gold);font-weight:600}

/* MAIN */
.main{padding:16px 16px calc(env(safe-area-inset-bottom,0px) + 80px);max-width:600px;margin:0 auto}
.panel{display:none}
.panel.active{display:block}

/* SECTION CARD */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:14px}
.card-head{padding:14px 16px 0}
.card-title{font-family:var(--ff-head);font-size:15px;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';width:3px;height:16px;border-radius:2px;background:var(--gold);flex-shrink:0}
.card-body{padding:0 16px 16px}

/* BET TYPE CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.chip{
  padding:7px 14px;border-radius:var(--radius-pill);border:1.5px solid var(--border2);
  font-size:13px;font-weight:500;color:var(--text2);background:var(--surface2);
  cursor:pointer;transition:all 0.12s;user-select:none;
}
.chip.active{background:var(--green);color:var(--gold-mid);border-color:var(--green)}
.chip:active{transform:scale(0.96)}

/* FORM ELEMENTS */
.field{margin-bottom:12px}
.label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em}
input[type=text],input[type=number],textarea,select{
  width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);
  font-family:var(--ff-body);font-size:15px;color:var(--text);background:var(--surface);
  outline:none;-webkit-appearance:none;appearance:none;
  transition:border-color 0.15s;
}
input[type=text]:focus,input[type=number]:focus,textarea:focus{border-color:var(--gold)}
textarea{resize:none;min-height:80px;line-height:1.5}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* HORSE QUICK-ADD */
.horse-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.hbtn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 4px;border-radius:var(--radius-sm);border:1.5px solid var(--border);
  background:var(--surface2);cursor:pointer;transition:all 0.12s;
  font-family:var(--ff-body);
}
.hbtn.selected{background:var(--green-light);border-color:var(--green-mid)}
.hbtn:active{transform:scale(0.95)}
.hbtn-num{font-size:16px;font-weight:700;color:var(--green);line-height:1}
.hbtn-name{font-size:9px;color:var(--text2);margin-top:2px;text-align:center;line-height:1.2;max-width:56px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hbtn.selected .hbtn-num{color:var(--green-mid)}
.hbtn.selected .hbtn-name{color:var(--green-muted)}

/* SELECTED HORSES DISPLAY */
.sel-horses{display:flex;flex-wrap:wrap;gap:6px;min-height:36px;padding:8px;background:var(--surface2);border-radius:var(--radius-sm);border:1.5px dashed var(--border2);margin-bottom:12px}
.sel-horse{display:flex;align-items:center;gap:5px;padding:4px 10px 4px 5px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-pill)}
.sel-horse-num{width:22px;height:22px;border-radius:50%;background:var(--green);color:var(--gold-mid);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sel-horse-name{font-size:12px;font-weight:500;color:var(--text);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sel-horse-del{font-size:14px;color:var(--text3);margin-left:2px;cursor:pointer;line-height:1}
.sel-placeholder{font-size:12px;color:var(--text3);align-self:center;padding:2px 4px}

/* BUTTONS */
.btn-primary{
  width:100%;padding:15px;background:var(--green);color:var(--gold-mid);
  border:none;border-radius:var(--radius);font-family:var(--ff-head);font-size:16px;
  font-weight:700;cursor:pointer;letter-spacing:0.03em;transition:background 0.15s;
}
.btn-primary:active{background:var(--green-mid);transform:scale(0.99)}

/* BET CARDS */
.bet-list{display:flex;flex-direction:column;gap:10px}
.bet-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.bet-item-head{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}
.bet-badge{padding:3px 10px;border-radius:var(--radius-pill);font-size:11px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;flex-shrink:0}
.b-wps{background:#E4F0E4;color:#1A5C20}
.b-exacta{background:#E4EDF8;color:#0C3878}
.b-trifecta{background:#F0E8F8;color:#541878}
.b-superfecta{background:#FFF0D4;color:#7A3C00}
.b-box{background:#E8F4FF;color:#0A3060}
.b-key{background:#FFF4E4;color:#7A4A00}
.b-other{background:#F0EFE8;color:#3A3828}
.bet-item-title{font-size:13px;font-weight:600;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bet-amt{font-size:12px;color:var(--text2);font-weight:500;flex-shrink:0}
.bet-del{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0}
.bet-del:active{color:var(--red)}
.bet-item-body{padding:10px 14px}
.bet-horses{display:flex;flex-wrap:wrap;gap:5px}
.bh-chip{display:flex;align-items:center;gap:4px;padding:3px 8px 3px 4px;background:var(--green-light);border:1px solid #C0DCC0;border-radius:var(--radius-pill)}
.bh-num{width:18px;height:18px;border-radius:50%;background:var(--green);color:var(--gold-mid);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.bh-name{font-size:11px;font-weight:500;color:#1A4A20}
.bet-note{font-size:11px;color:var(--text3);margin-top:5px;font-style:italic}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:36px;display:block;margin-bottom:8px}
.empty p{font-size:14px}

/* SUMMARY */
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sum-tile{background:var(--surface2);border-radius:var(--radius-sm);padding:14px;text-align:center;border:1px solid var(--border)}
.sum-tile-val{font-size:28px;font-weight:700;color:var(--green);display:block;font-family:var(--ff-head)}
.sum-tile-lbl{font-size:11px;color:var(--text2);margin-top:2px;display:block;text-transform:uppercase;letter-spacing:0.05em}
.type-bars{display:flex;flex-direction:column;gap:8px}
.tbar-row{display:flex;align-items:center;gap:10px}
.tbar-label{font-size:13px;color:var(--text);width:120px;flex-shrink:0;font-weight:500}
.tbar-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.tbar-fill{height:100%;background:var(--green);border-radius:3px}
.tbar-count{font-size:12px;color:var(--text2);min-width:24px;text-align:right}
.all-h-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}

/* BOTTOM SAFE AREA FAB */
.fab-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);
  padding:10px 16px calc(env(safe-area-inset-bottom,0px) + 10px);
  display:none;
}
.fab-bar.visible{display:block}
.fab-bar .btn-primary{padding:14px}

/* NOTICE */
.notice{background:var(--gold-pale);border-left:3px solid var(--gold);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 12px;font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.6}
.notice code{font-family:monospace;background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:4px}

/* CLEAR BTN */
.btn-danger{padding:10px 20px;background:none;color:var(--red);border:1.5px solid #F0CCCC;border-radius:var(--radius-sm);font-family:var(--ff-body);font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}
.btn-danger:active{background:var(--red-light)}

/* ANIMATIONS */
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.bet-item{animation:slideIn 0.2s ease}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div>
      <h1>🌹 Derby Bet Tracker</h1>
      <p>152nd Run for the Roses — May 2, 2026</p>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat"><span class="stat-val" id="s-bets">0</span><span class="stat-lbl">Bets</span></div>
    <div class="stat"><span class="stat-val" id="s-horses">0</span><span class="stat-lbl">Horses</span></div>
    <div class="stat"><span class="stat-val" id="s-wagered">$0</span><span class="stat-lbl">Wagered</span></div>
  </div>
</header>

<nav class="nav">
  <button class="nav-btn active" onclick="showPanel('add')">Add Bet</button>
  <button class="nav-btn" onclick="showPanel('bets')">My Bets</button>
  <button class="nav-btn" onclick="showPanel('summary')">Summary</button>
</nav>

<main class="main">

  <!-- ADD BET PANEL -->
  <div id="panel-add" class="panel active">
    <div class="card">
      <div class="card-head">
        <div class="card-title">Bet type</div>
      </div>
      <div class="card-body">
        <div class="chips" id="type-chips">
          <div class="chip active" data-type="Win/Place/Show">Win / Place / Show</div>
          <div class="chip" data-type="Exacta">Exacta</div>
          <div class="chip" data-type="Trifecta">Trifecta</div>
          <div class="chip" data-type="Superfecta">Superfecta</div>
          <div class="chip" data-type="Daily Double">Daily Double</div>
          <div class="chip" data-type="Box">Box</div>
          <div class="chip" data-type="Key">Key</div>
          <div class="chip" data-type="Other">Other</div>
        </div>
        <div class="input-row" style="margin-bottom:12px">
          <div class="field" style="margin:0">
            <label class="label">Wager ($)</label>
            <input type="number" id="inp-amt" placeholder="2" inputmode="decimal" min="0" step="0.5">
          </div>
          <div class="field" style="margin:0">
            <label class="label">Note (optional)</label>
            <input type="text" id="inp-note" placeholder="e.g. box, key on top">
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="card-title">Select horses</div>
      </div>
      <div class="card-body">
        <div id="sel-display" class="sel-horses">
          <span class="sel-placeholder">Tap horses below to add them</span>
        </div>
        <div class="horse-grid" id="horse-grid"></div>
        <button class="btn-primary" onclick="addBet()">Add Bet</button>
      </div>
    </div>
  </div>

  <!-- MY BETS PANEL -->
  <div id="panel-bets" class="panel">
    <div id="bets-container" class="bet-list"></div>
  </div>

  <!-- SUMMARY PANEL -->
  <div id="panel-summary" class="panel">
    <div class="sum-grid">
      <div class="sum-tile"><span class="sum-tile-val" id="ss-bets">0</span><span class="sum-tile-lbl">Total Bets</span></div>
      <div class="sum-tile"><span class="sum-tile-val" id="ss-amt">$0</span><span class="sum-tile-lbl">Wagered</span></div>
      <div class="sum-tile"><span class="sum-tile-val" id="ss-horses">0</span><span class="sum-tile-lbl">Horses</span></div>
      <div class="sum-tile"><span class="sum-tile-val" id="ss-types">0</span><span class="sum-tile-lbl">Bet Types</span></div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div class="card-head"><div class="card-title">Bets by type</div></div>
      <div class="card-body"><div class="type-bars" id="type-bars"></div></div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div class="card-head"><div class="card-title">All horses covered</div></div>
      <div class="card-body"><div class="all-h-chips" id="all-h-chips"></div></div>
    </div>
    <button class="btn-danger" onclick="clearAll()">Clear all bets</button>
  </div>

</main>

<script>
const HORSES = {
  1:'Renegade',2:'Albus',3:'Intrepido',4:'Litmus Test',5:'Right to Party',
  6:'Commandment',7:'Danon Bourbon',8:'So Happy',9:'The Puma',10:'Wonder Dean',
  11:'Incredibolt',12:'Chief Wallabee',14:'Potente',15:'Emerging Market',
  16:'Pavlovian',17:'Six Speed',18:'Further Ado',19:'Golden Tempo',20:'Fulleffort',21:'Great White'
};

let bets = JSON.parse(localStorage.getItem('derby26')||'[]');
let selType = 'Win/Place/Show';
let selHorses = [];

// Build horse grid
const grid = document.getElementById('horse-grid');
Object.entries(HORSES).forEach(([num, name])=>{
  const b = document.createElement('button');
  b.className = 'hbtn';
  b.dataset.num = num;
  b.innerHTML = `<span class="hbtn-num">${num}</span><span class="hbtn-name">${name}</span>`;
  b.onclick = () => toggleHorse(parseInt(num), name, b);
  grid.appendChild(b);
});

function toggleHorse(num, name, el){
  const idx = selHorses.findIndex(h=>h.num===num);
  if(idx>=0){ selHorses.splice(idx,1); el.classList.remove('selected'); }
  else { selHorses.push({num,name}); el.classList.add('selected'); }
  renderSelDisplay();
}

function renderSelDisplay(){
  const el = document.getElementById('sel-display');
  if(!selHorses.length){
    el.innerHTML='<span class="sel-placeholder">Tap horses below to add them</span>';
    return;
  }
  el.innerHTML = selHorses.map(h=>`
    <div class="sel-horse">
      <div class="sel-horse-num">${h.num}</div>
      <span class="sel-horse-name">${h.name}</span>
      <span class="sel-horse-del" onclick="removeSelHorse(${h.num})">×</span>
    </div>
  `).join('');
}

function removeSelHorse(num){
  selHorses = selHorses.filter(h=>h.num!==num);
  document.querySelector(`.hbtn[data-num="${num}"]`)?.classList.remove('selected');
  renderSelDisplay();
}

// Type chip selection
document.querySelectorAll('.chip').forEach(c=>{
  c.addEventListener('click',function(){
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
    selType = this.dataset.type;
  });
});

function addBet(){
  if(!selHorses.length){ alert('Pick at least one horse!'); return; }
  const amt = parseFloat(document.getElementById('inp-amt').value)||0;
  const note = document.getElementById('inp-note').value.trim();
  bets.unshift({id:Date.now(), type:selType, horses:[...selHorses], amount:amt, note});
  save();
  // reset
  selHorses = [];
  document.querySelectorAll('.hbtn').forEach(b=>b.classList.remove('selected'));
  renderSelDisplay();
  document.getElementById('inp-amt').value='';
  document.getElementById('inp-note').value='';
  updateStats();
  // flash to bets
  showPanel('bets');
  renderBets();
}

function deleteBet(id){
  bets = bets.filter(b=>b.id!==id);
  save(); renderBets(); updateStats();
}

function clearAll(){
  if(!bets.length) return;
  if(confirm('Remove all '+bets.length+' bet'+(bets.length!==1?'s':'')+' ?')){
    bets=[];save();renderBets();updateStats();
    document.getElementById('type-bars').innerHTML='';
    document.getElementById('all-h-chips').innerHTML='';
    document.getElementById('ss-bets').textContent='0';
    document.getElementById('ss-amt').textContent='$0';
    document.getElementById('ss-horses').textContent='0';
    document.getElementById('ss-types').textContent='0';
  }
}

function badgeClass(t){
  if(t==='Win/Place/Show') return 'b-wps';
  if(t==='Exacta'||t==='Daily Double') return 'b-exacta';
  if(t==='Trifecta') return 'b-trifecta';
  if(t==='Superfecta') return 'b-superfecta';
  if(t==='Box') return 'b-box';
  if(t==='Key') return 'b-key';
  return 'b-other';
}

function renderBets(){
  const el = document.getElementById('bets-container');
  if(!bets.length){
    el.innerHTML=`<div class="empty"><span class="empty-icon">🎟️</span><p>No bets yet. Tap "Add Bet" to get started.</p></div>`;
    return;
  }
  el.innerHTML = bets.map(b=>`
    <div class="bet-item">
      <div class="bet-item-head">
        <span class="bet-badge ${badgeClass(b.type)}">${b.type}</span>
        <span class="bet-item-title">${b.horses.map(h=>h.name).join(' → ')}</span>
        ${b.amount ? `<span class="bet-amt">$${b.amount.toFixed(2)}</span>` : ''}
        <button class="bet-del" onclick="deleteBet(${b.id})">×</button>
      </div>
      <div class="bet-item-body">
        <div class="bet-horses">
          ${b.horses.map(h=>`
            <div class="bh-chip">
              <div class="bh-num">${h.num}</div>
              <span class="bh-name">${h.name}</span>
            </div>
          `).join('')}
        </div>
        ${b.note?`<p class="bet-note">${b.note}</p>`:''}
      </div>
    </div>
  `).join('');
}

function renderSummary(){
  const total = bets.length;
  const totalAmt = bets.reduce((s,b)=>s+(b.amount||0),0);
  const horseMap = {};
  bets.forEach(b=>b.horses.forEach(h=>{ if(!horseMap[h.num]) horseMap[h.num]=h; }));
  const typeMap = {};
  bets.forEach(b=>{ typeMap[b.type]=(typeMap[b.type]||0)+1; });
  document.getElementById('ss-bets').textContent = total;
  document.getElementById('ss-amt').textContent = '$'+totalAmt.toFixed(total&&totalAmt%1?2:0);
  document.getElementById('ss-horses').textContent = Object.keys(horseMap).length;
  document.getElementById('ss-types').textContent = Object.keys(typeMap).length;
  const max = Math.max(...Object.values(typeMap),1);
  document.getElementById('type-bars').innerHTML = Object.entries(typeMap).sort((a,b)=>b[1]-a[1]).map(([t,c])=>`
    <div class="tbar-row">
      <span class="tbar-label">${t}</span>
      <div class="tbar-track"><div class="tbar-fill" style="width:${Math.round(c/max*100)}%"></div></div>
      <span class="tbar-count">${c}</span>
    </div>
  `).join('');
  document.getElementById('all-h-chips').innerHTML = Object.values(horseMap).sort((a,b)=>a.num-b.num).map(h=>`
    <div class="bh-chip">
      <div class="bh-num">${h.num}</div>
      <span class="bh-name">${h.name}</span>
    </div>
  `).join('') || '<span style="font-size:13px;color:var(--text3)">No horses yet</span>';
}

function updateStats(){
  const total = bets.length;
  const horses = [...new Set(bets.flatMap(b=>b.horses.map(h=>h.num)))].length;
  const amt = bets.reduce((s,b)=>s+(b.amount||0),0);
  document.getElementById('s-bets').textContent = total;
  document.getElementById('s-horses').textContent = horses;
  document.getElementById('s-wagered').textContent = '$'+Math.round(amt);
}

function showPanel(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  const btns = document.querySelectorAll('.nav-btn');
  const idx = ['add','bets','summary'].indexOf(name);
  if(idx>=0) btns[idx].classList.add('active');
  if(name==='summary') renderSummary();
  window.scrollTo(0,0);
}

function save(){ localStorage.setItem('derby26', JSON.stringify(bets)); }

// Init
renderBets();
updateStats();
</script>
